name: nightly
on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch: {}
jobs:
  verify-latest-hyprland:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build + verify latest Hyprland (via nixos/nix Docker image)
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace nixos/nix:latest sh -c '
            git config --global --add safe.directory /workspace &&
            nix --extra-experimental-features "nix-command flakes" \
                --option accept-flake-config true \
                run --override-input hyprland github:hyprwm/Hyprland .#verify
          '
