name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: luajit-2.1
      - uses: leafo/gh-actions-luarocks@v6
      - run: luarocks install luacheck
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ github.token }}
          version: "2.5.2"
          args: --check .
      - run: luacheck .
      - run: shopt -s nullglob; for f in spec/*_spec.lua; do lua "$f"; done
        shell: bash
